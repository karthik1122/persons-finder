name: Secure CI Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: # manual trigger

jobs:
  secure-build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1️⃣ Checkout the code
      # -----------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------
      # 2️⃣ Set up Java 17
      # -----------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # -----------------------------
      # 3️⃣ Cache Gradle dependencies
      # -----------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      # -----------------------------
      # 4️⃣ Ensure Gradle wrapper is executable
      # -----------------------------
      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      # -----------------------------
      # 5️⃣ Build + Test
      # -----------------------------
      - name: Clean Build
        run: ./gradlew clean build --stacktrace

      - name: Run Unit Tests
        run: ./gradlew test --info

      # -----------------------------
      # 6️⃣ Trivy File System Scan
      # (Detect secrets, misconfig, vulnerabilities)
      # -----------------------------
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1         # Fail build on HIGH/CRITICAL
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # -----------------------------
      # 7️⃣ Build Docker image locally
      # -----------------------------
      - name: Build Docker Image
        run: docker build -t persons-finder:ci .

      # -----------------------------
      # 8️⃣ Trivy Docker Image Scan
      # -----------------------------
      - name: Trivy Docker Image Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: persons-finder:ci
          format: table
          exit-code: 1         # Fail build on HIGH/CRITICAL
          ignore-unfixed: true
          severity: CRITICAL,HIGH