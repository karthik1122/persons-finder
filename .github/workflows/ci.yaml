name: Secure CI Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  secure-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------
      # Java Setup
      # -----------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Grant execute permission
        run: chmod +x gradlew

      # -----------------------------
      # Build + Test
      # -----------------------------
      - name: Build Project
        run: ./gradlew clean build

      - name: Run Unit Tests
        run: ./gradlew test

      # -----------------------------
      # Trivy File System Scan
      # (Secrets + Config + Vulns)
      # -----------------------------
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # -----------------------------
      # Build Docker Image (Local Only)
      # -----------------------------
      - name: Build Docker Image
        run: docker build -t persons-finder:ci .

      # -----------------------------
      # Trivy Image Scan
      # -----------------------------
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: persons-finder:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH